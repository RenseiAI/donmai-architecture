# Closed-source content guard for the donmai-architecture corpus.
#
# Runs guard-b-lint.sh to catch:
#   - Rensei brand leaks (RENSEI_BRAND)
#   - Linear issue IDs (LINEAR_ID)
#   - Private-repo references (RENSEI_TUI, RENSEI_PLATFORM)
#   - Internal domain refs (RENSEI_AI_DOMAIN)
#   - Internal monorepo paths (PLATFORM_PATH)
#   - Developer absolute paths (DEV_ABS_PATH)
#   - Closed-source env var names (RENSEI_ENV_VAR)
#
# Failures are annotated as GitHub Actions errors on the offending line.
# See scripts/guard-b-lint.sh and .guard-allowlist for the rule set and
# per-line overrides.

name: Closed-source content guard

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.sh'
      - '**/*.toml'
      - '.guard-allowlist'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '**/*.yaml'
      - '**/*.yml'
      - '**/*.sh'
      - '**/*.toml'
      - '.guard-allowlist'
  workflow_dispatch:

jobs:
  guard-b:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v7

      - name: Run guard-b-lint (all files)
        run: ./scripts/guard-b-lint.sh --all
